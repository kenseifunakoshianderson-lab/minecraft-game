<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Minecraft Game</title>
<style>
body { margin:0; overflow:hidden; }
#crosshair{
  position:fixed; top:50%; left:50%;
  width:20px; height:20px;
  margin-left:-10px;
  margin-top:-10px;
  pointer-events:none;
}
#crosshair:before,#crosshair:after{
  content:""; position:absolute; background:white;
}
#crosshair:before{ left:9px; top:0; width:2px; height:20px; }
#crosshair:after{ top:9px; left:0; width:20px; height:2px; }

/* ホットバー */
#hotbar {
  position:fixed; bottom:20px; left:50%;
  transform:translateX(-50%);
  display:none; gap:4px; z-index:999;
}
.slot {
  width:40px; height:40px;
  background:#333; border:2px solid white;
}
.slot.selected { border-color:yellow; }
</style>
</head>

<body>
<div id="crosshair"></div>

<div id="hotbar">
  <div class="slot"></div><div class="slot"></div><div class="slot"></div>
  <div class="slot"></div><div class="slot"></div><div class="slot"></div>
  <div class="slot"></div><div class="slot"></div><div class="slot"></div>
</div>

<script type="module" src="./main.js"></script>
</body>
</html>
